# ===========================================
# WEEB 项目配置示例文件
# 复制此文件为 application-dev.properties 或 application-prod.properties
# 并根据实际情况修改配置值
# ===========================================

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/weeb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password

# Redis配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=your_redis_password
spring.data.redis.database=0

# JWT配置
jwt.secret=your_jwt_secret_key_here
jwt.expiration=3600000

# 阿里云OSS配置
aliyun.oss.endpoint=oss-cn-hangzhou.aliyuncs.com
aliyun.oss.accessKeyId=your_aliyun_access_key_id
aliyun.oss.accessKeySecret=your_aliyun_access_key_secret
aliyun.oss.bucketName=your_bucket_name

# OAuth2配置 (Google)
oauth2.google.client-id=your_google_client_id.apps.googleusercontent.com
oauth2.google.client-secret=your_google_client_secret

# OAuth2配置 (Microsoft)
oauth2.microsoft.client-id=your_microsoft_client_id
oauth2.microsoft.client-secret=your_microsoft_client_secret

# 豆包AI配置
weeb.doubao.api-key=your_doubao_api_key
weeb.doubao.model=ep-20241231132608-lbm7g
weeb.doubao.count-limit=5
weeb.doubao.length-limit=50

# 群聊配置
weeb.password=sun55@kong
weeb.limit=100
weeb.name=233
weeb.expires=7

# Elasticsearch配置
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=elastic
spring.elasticsearch.password=your_elasticsearch_password

# 日志配置
logging.level.com.web=DEBUG
logging.level.org.springframework.security=DEBUG

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 缓存配置
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m

